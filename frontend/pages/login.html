<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Emprendedores IPN</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="auth-container">
      <div class="logo">
        <h1>Emprendedores IPN</h1>
        <p>Inicia sesión con tu correo institucional</p>
      </div>

      <div id="alert"></div>

      <form id="loginForm">
        <div class="input-group">
          <label for="email">Correo institucional</label>
          <input type="email" id="email" required placeholder="tucorreo@alumno.ipn.mx">
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>

      <div class="link">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById("alert");
      alertBox.innerHTML = "";

      try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const data = await api.login(email, password);
        Auth.setToken(data.access_token);
        Auth.setUser(data.user);
        Auth.setRole("comprador");
        if (data.user.is_admin) {
          window.location.href = "admin.html";
        } else {
          window.location.href = "feed.html";
        }
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>

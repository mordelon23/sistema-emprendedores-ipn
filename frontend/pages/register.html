<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Emprendedores IPN</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="auth-container">
      <div class="logo">
        <h1>Crear Cuenta</h1>
        <p>Usa tu correo @alumno.ipn.mx</p>
      </div>

      <div id="alert"></div>

      <form id="registerForm">
        <div class="input-group">
          <label for="nombre">Nombre(s)</label>
          <input type="text" id="nombre" required>
        </div>
        <div class="input-group">
          <label for="apellido">Apellido(s)</label>
          <input type="text" id="apellido" required>
        </div>
        <div class="input-group">
          <label for="email">Correo institucional</label>
          <input type="email" id="email" required placeholder="tucorreo@alumno.ipn.mx">
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required>
          <small style="color: var(--text-light); font-size: 12px;">
            Mínimo 8 caracteres, una mayúscula, una minúscula y un número.
          </small>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Crear cuenta</button>
      </form>

      <div class="link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById("alert");
      alertBox.innerHTML = "";

      try {
        const data = {
          nombre: document.getElementById("nombre").value,
          apellido: document.getElementById("apellido").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };
        await api.post("/api/auth/register", data);
        alertBox.innerHTML = `<div class="alert alert-success">¡Cuenta creada! Redirigiendo al login...</div>`;
        setTimeout(() => window.location.href = "login.html", 1500);
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
